<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: rounded square, тёмно-зелёный -->
  <rect width="64" height="64" rx="14" fill="#15803d"/>

  <!-- Стена/крыша бани — трапеция -->
  <path d="M10 30 L32 14 L54 30 Z" fill="#ffffff" opacity="0.95"/>
  <!-- Корпус бани -->
  <rect x="14" y="30" width="36" height="20" rx="2" fill="#ffffff" opacity="0.95"/>

  <!-- Дверь -->
  <rect x="27" y="38" width="10" height="12" rx="1.5" fill="#15803d"/>

  <!-- Окно -->
  <rect x="17" y="33" width="8" height="7" rx="1" fill="#15803d" opacity="0.7"/>

  <!-- Пар / огонь — три волнистые линии над крышей -->
  <path d="M24 12 C24 9, 27 8, 26 5" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M32 10 C32 7, 35 6, 34 3" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M40 12 C40 9, 43 8, 42 5" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
